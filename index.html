<div class="firebase-controls">
  <!-- الأزرار الموجودة -->
  <button id="useLocalBtn" class="firebase-btn btn-local"><i class="fas fa-hdd"></i> تخزين محلي</button>
  <button id="useCloudBtn" class="firebase-btn btn-cloud"><i class="fas fa-cloud"></i> تخزين سحابي</button>
  <button id="syncDataBtn" class="firebase-btn btn-sync"><i class="fas fa-sync-alt"></i> مزامنة البيانات</button>
  <button id="loginBtn" class="firebase-btn btn-login"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</button>
  
  <!-- ===== زر تصحيح الأيميلات ===== -->
  <button id="fixEmailsBtn" class="firebase-btn btn-fix-emails"><i class="fas fa-envelope"></i> تصحيح الأيميلات</button>
  
  <!-- ===== زر جلب المواقع ===== -->
  <button id="fetchLocationsBtn" class="firebase-btn btn-fix-emails"><i class="fas fa-map-marker-alt"></i> جلب المواقع</button>
  
  <!-- ===== زر المشرف ===== -->
  <button id="adminViewBtn" class="btn-admin"><i class="fas fa-eye"></i> عرض الكل (مشرف)</button>
  
  <div id="firebaseStatus" class="firebase-status offline"><i class="fas fa-wifi"></i> غير متصل</div>
</div>
